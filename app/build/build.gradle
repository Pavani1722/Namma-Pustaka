plugins {
    id "com.android.application"
}

android {
    namespace "com.mindmatrix.nammapustaka"
    compileSdk 35

    defaultConfig {
        applicationId "com.mindmatrix.nammapustaka"
        minSdk 23
        targetSdk 35
        versionCode 1
        versionName "1.0"
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = "UTF-8"
}
